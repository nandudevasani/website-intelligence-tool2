<!DOCTYPE html>
<html>
<head>
    <title>Domain Intelligence Tool</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
</head>
<body>
    <h1>Domain Analyzer</h1>
    <textarea id="domainInput" placeholder="Enter domains..."></textarea>
    <div class="btns">
        <button id="analyzeBtn" style="background:#007bff; color:white;">Run Analysis</button>
        <button id="exportBtn" style="background:#28a745; color:white;">Export Excel</button>
    </div>
    <table id="resultsTable">
        <thead>
            <tr><th>Domain</th><th>Status</th><th>Remark</th><th>AI Decode</th><th>Manual Notes</th></tr>
        </thead>
        <tbody></tbody>
    </table>
    <script src="script.js"></script>
</body>
</html>
