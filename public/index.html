<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Website Intelligence Tool</title>
<style>
body { font-family: Arial, sans-serif; padding: 20px; background: #f9f9f9; }
textarea { width: 100%; height: 150px; padding: 10px; margin-bottom: 10px; font-size: 14px; }
button { padding: 10px 20px; font-size: 16px; cursor: pointer; }
table { width: 100%; border-collapse: collapse; margin-top: 20px; }
th, td { padding: 10px; border: 1px solid #ccc; text-align: left; }
th { background: #eee; }
</style>
</head>
<body>

<h2>Website Intelligence Tool</h2>
<p>Enter domains (one per line):</p>
<textarea id="domainsInput"></textarea><br>
<button onclick="analyzeDomains()">Analyze Domains</button>

<table id="resultsTable">
<thead>
<tr>
<th>Domain</th>
<th>Status</th>
<th>Remark</th>
<th>Notes</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>
async function analyzeDomains() {
    const text = document.getElementById('domainsInput').value.trim();
    if (!text) return alert('Please enter at least one domain.');
    
    const response = await fetch('/api/analyze/bulk', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ domains: text })
    });

    const data = await response.json();
    const tbody = document.querySelector('#resultsTable tbody');
    tbody.innerHTML = '';

    if (data.results) {
        data.results.forEach(r => {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${r.domain}</td><td>${r.status}</td><td>${r.remark}</td><td>${r.notes}</td>`;
            tbody.appendChild(tr);
        });
    } else {
        alert('Error analyzing domains.');
    }
}
</script>

</body>
</html>
