<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bulk Website Analysis</title>
<style>
body{font-family:Arial,sans-serif;padding:20px;}
textarea{width:100%;height:150px;margin-top:10px;}
button{margin-top:10px;margin-right:5px;}
table{border-collapse:collapse;width:100%;margin-top:20px;}
th,td{border:1px solid #ccc;padding:6px;}
th{background:#eee;}
</style>
</head>
<body>
<h2>Bulk Website Analysis</h2>
<p>Enter one domain per line:</p>
<textarea id="domainList" placeholder="example.com"></textarea><br>
<button onclick="runAnalysis()">Analyze</button>
<button onclick="exportCSV()">Export CSV</button>

<table id="resultsTable">
  <thead>
    <tr><th>Domain</th><th>Status</th><th>Remark</th><th>Notes</th></tr>
  </thead>
  <tbody></tbody>
</table>

<script>
async function runAnalysis(){
  const domains=document.getElementById('domainList').value.split('\n').map(d=>d.trim()).filter(d=>d);
  if(domains.length===0){alert('Enter domains');return;}
  const res=await fetch('/api/analyze/bulk',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({domains})
  });
  const data=await res.json();
  const tbody=document.querySelector('#resultsTable tbody');
  tbody.innerHTML='';
  data.results.forEach(r=>{
    const tr=document.createElement('tr');
    tr.innerHTML=`<td>${r.domain}</td><td>${r.status}</td><td>${r.remark}</td><td>${r.notes}</td>`;
    tbody.appendChild(tr);
  });
}

function exportCSV(){
  const rows=document.querySelectorAll('#resultsTable tr');
  const csv=[];
  rows.forEach(r=>{
    const cols=[...r.cells].map(c=>c.innerText);
    csv.push(cols.join(','));
  });
  const blob=new Blob([csv.join('\n')],{type:'text/csv;charset=utf-8;'});
  const link=document.createElement('a'); link.href=URL.createObjectURL(blob); link.download='analysis.csv'; link.click();
}
</script>
</body>
</html>
