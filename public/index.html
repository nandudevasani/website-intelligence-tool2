<!DOCTYPE html>
<html>
<head>
    <title>Website Intelligence Tool</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <h1>Domain Analyzer</h1>
    <textarea id="domainInput" placeholder="Enter domains (one per line)"></textarea>
    <div class="actions">
        <button id="analyzeBtn">Analyze</button>
        <button id="exportBtn">Export Excel</button>
    </div>
    <canvas id="statusChart"></canvas>
    <table id="resultsTable">
        <thead>
            <tr><th>Domain</th><th>Status</th><th>Remark</th><th>Notes</th></tr>
        </thead>
        <tbody></tbody>
    </table>
    <script src="script.js"></script>
</body>
</html>
