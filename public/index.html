<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Website Intelligence Dashboard</title>
<style>
body { font-family: Arial, sans-serif; padding: 20px; }
table { border-collapse: collapse; width: 100%; margin-top: 20px; }
th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
th { background: #eee; }
#barChart { width: 100%; height: 300px; margin-top: 30px; }
</style>
</head>
<body>
<h2>Bulk Website Analysis</h2>
<textarea id="domainList" rows="6" style="width:100%;" placeholder="Enter domains separated by commas"></textarea><br>
<button onclick="runAnalysis()">Analyze</button>
<button onclick="exportExcel()">Export to Excel</button>

<table id="resultsTable">
  <thead>
    <tr><th>Domain</th><th>Status</th><th>Remark</th><th>Notes</th></tr>
  </thead>
  <tbody></tbody>
</table>

<canvas id="barChart"></canvas>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
async function runAnalysis() {
  const domains = document.getElementById('domainList').value.split(',').map(d => d.trim()).filter(d => d);
  if(domains.length === 0) return alert('Enter at least one domain');
  const res = await fetch('/api/analyze/bulk', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ domains })
  });
  const data = await res.json();
  const tbody = document.querySelector('#resultsTable tbody');
  tbody.innerHTML = '';
  data.results.forEach(r => {
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${r.domain}</td><td>${r.status}</td><td>${r.remark}</td><td>${r.notes}</td>`;
    tbody.appendChild(tr);
  });

  const summary = {};
  data.results.forEach(r => summary[r.status] = (summary[r.status]||0)+1);

  const ctx = document.getElementById('barChart').getContext('2d');
  new Chart(ctx, { type:'bar', data:{ labels:Object.keys(summary), datasets:[{label:'Domains', data:Object.values(summary), backgroundColor:'#4caf50'}] }, options:{ responsive:true, plugins:{legend:{display:false}} } });
}

function exportExcel() {
  let table = document.getElementById('resultsTable');
  let csv = [];
  for(let row of table.rows){
    let cols=[];
    for(let cell of row.cells) cols.push(cell.innerText);
    csv.push(cols.join(','));
  }
  const blob = new Blob([csv.join('\n')], {type:'text/csv;charset=utf-8;'});
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = 'website_analysis.csv';
  link.click();
}
</script>
</body>
</html>
