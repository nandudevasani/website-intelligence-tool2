<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Website Intelligence Tool</title>
<style>
body { font-family: Arial; margin: 20px; }
textarea { width: 100%; height: 150px; }
table { width: 100%; border-collapse: collapse; margin-top: 20px; }
th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
</style>
</head>
<body>
<h2>Website Intelligence Tool</h2>
<p>Enter one domain per line:</p>
<textarea id="domains"></textarea><br>
<button onclick="analyze()">Analyze</button>
<table id="results">
<thead>
<tr><th>Domain</th><th>Status</th><th>Remark</th><th>Notes</th></tr>
</thead>
<tbody></tbody>
</table>

<script>
async function analyze() {
  const input = document.getElementById('domains').value.split('\n').map(d => d.trim()).filter(d=>d);
  if(input.length===0) return alert('Enter domains');

  const res = await fetch('/api/analyze/bulk', {
    method: 'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({domains: input})
  });
  const data = await res.json();
  const tbody = document.querySelector('#results tbody');
  tbody.innerHTML = '';
  data.results.forEach(r=>{
    const tr = document.createElement('tr');
    ['domain','status','remark','notes'].forEach(k=>{
      const td = document.createElement('td');
      td.textContent = r[k];
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
}
</script>
</body>
</html>
