<!DOCTYPE html>
<html>
<head>
    <title>Website Intelligence Tool</title>
</head>
<body>
    <h1>Domain Analyzer</h1>
    <textarea id="domains" placeholder="Enter domains (one per line)"></textarea>
    <button onclick="runAnalysis()">Analyze</button>
    <pre id="output"></pre>

    <script>
        async function runAnalysis() {
            const text = document.getElementById('domains').value;
            const domains = text.split('\n').filter(d => d.trim() !== '');
            
            const response = await fetch('/api/analyze/bulk', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ domains })
            });
            const data = await response.json();
            document.getElementById('output').innerText = JSON.stringify(data, null, 2);
        }
    </script>
</body>
</html>
